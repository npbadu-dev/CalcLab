<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CalcLab - All mini project in 1 site</title>
    <link rel="stylesheet" href="css/style.css" />

  <body class="">

        <ul class="navigation flex flex-col gap-10">
          <li class="hidden">
            <a href="#" class="flex gap-2"><i class="fa-solid fa-bars"></i></a>
          </li>
          <li>
            <a href="#" class="flex gap-2">
              <i class="fa-solid fa-house"></i>
              <span>Home</span>
            </a>
          </li>
          <li>
            <a href="#" class="flex gap-2">
              <i class="fa-solid fa-border-all"></i>
              <span>All Projects</span>
            </a>
          </li>
          <li>
            <a href="#" class="flex gap-2">
              <i class="fa-solid fa-calculator"></i>

          </li>
          <li>
            <a href="#" class="flex gap-2">

          </li>
          <li>
            <a href="#" class="flex gap-2">
              <i class="fa-solid fa-users"></i>

            </a>
          </li>
          <li>
            <a href="#" class="flex gap-2">
              <i class="fa-solid fa-clock"></i>
              <span>Time Tools</span>
            </a>
          </li>
          <li>
            <a href="#" class="flex gap-2">
              <i class="fa-solid fa-gamepad"></i>
              <span>Fun Tools</span>
            </a>
          </li>
          <li>
            <a href="#" class="flex gap-2">
              <i class="fa-solid fa-star"></i>
              <span>Favorites</span>
            </a>
          </li>
          <li>
            <a href="#" class="flex gap-2">
              <i class="fa-solid fa-user"></i>
              <span>Profile</span>
            </a>
          </li>
        </ul>

      <div class="container-2 col-span-10 pr-12">
        <header>
          <nav class="navigation-section">
            <div class="header-top-bar flex justify-end gap-14">
              <button class="theme-toggle btn">
                <i class="fa-solid fa-sun"></i>
              </button>
              <a href="#" class="github-icon"
                ><i class="fa-brands fa-github"></i
              ></a>
            </div>
          </nav>
        </header>

        <main>
          <div class="main-container">
            <div class="hero-section"></div>
            <div class="search-section"></div>
            <div class="project-card-section"></div>
          </div>
        </main>

        <footer></footer>
      </div>

    <script src="js/app.js"></script>
    <script
      src="https://kit.fontawesome.com/8fddde4bd2.js"
      crossorigin="anonymous"
    ></script>
